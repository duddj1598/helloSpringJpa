<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 관리</title>
    <link rel="stylesheet" th:href="@{/resources/css/style.css}"> </head>
<body>

<h2>카테고리 목록</h2>

<div th:if="${successMessage}" style="color: blue; margin-bottom: 10px;">
    <p th:text="${successMessage}"></p>
</div>
<div th:if="${errorMessage}" style="color: red; margin-bottom: 10px;">
    <p th:text="${errorMessage}"></p>
</div>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리명</th>
        <th>관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}"></td>
        <td th:text="${cat.name}"></td>
        <td>
            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post"
                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<br>
<a th:href="@{/categories/create}">새 카테고리 등록</a> |
<a th:href="@{/products}">상품 목록으로 돌아가기</a>

</body>
</html>
